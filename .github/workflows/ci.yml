name: BalanceAI CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest

      - name: Syntax check
        run: |
          python -m compileall app.py src

      - name: Smoke test imports
        run: |
          python - <<'PY'
          import os
          import sys

          sys.path.insert(0, os.getcwd())

          # Basic smoke import for app entrypoint
          import app

          print("Smoke test passed: app imported successfully")
          PY

      - name: Run tests if present
        run: |
          if find tests -type f -name "test_*.py" -o -name "*_test.py" 2>/dev/null | grep -q .; then
            pytest -q
          else
            echo "No pytest test files found, skipping tests."
          fi